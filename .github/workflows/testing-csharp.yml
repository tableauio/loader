name: Testing C#

# Trigger on pushes, PRs (excluding documentation changes), and nightly.
on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    - cron: 0 0 * * * # daily at 00:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # protobuf-version below is the protoc release tag (without the leading
        # "v") fed to arduino/setup-protoc — NOT the libprotobuf C++ runtime
        # SemVer used in testing-cpp.yml. The pairs map to the same upstream
        # protobuf release:
        #   modern:    protoc v33.4   ↔ libprotobuf C++ 6.33.4   (testing-cpp.yml)
        #   legacy-v3: protoc v21.12  ↔ libprotobuf C++ 3.21.12  (testing-cpp.yml)
        # C# only needs protoc; libprotobuf is irrelevant, so we install via
        # arduino/setup-protoc instead of vcpkg.
        config:
          - label: modern
            protobuf-version: "33.4"
          - label: legacy-v3
            protobuf-version: "21.12"

    name: test (${{ matrix.os }}, ${{ matrix.config.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          cache: true

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ matrix.config.protobuf-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Buf
        uses: bufbuild/buf-action@v1
        with:
          version: 1.67.0
          setup_only: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protoconf
        working-directory: test/csharp-tableau-loader
        run: buf generate ..

      - name: Test
        working-directory: test/csharp-tableau-loader
        run: dotnet test --nologo --logger "console;verbosity=normal"

name: Testing C#

# Trigger on pushes, PRs (excluding documentation changes), and nightly.
on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    - cron: 0 0 * * * # daily at 00:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        config:
          - label: modern
            protobuf-version: "6.33.4"
          - label: legacy-v3
            protobuf-version: "3.21.12"

    name: test (${{ matrix.os }}, ${{ matrix.config.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          cache: true

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Protoc
        if: matrix.config.label != 'legacy-v3'
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ matrix.config.protobuf-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Protoc (legacy)
        if: matrix.config.label == 'legacy-v3'
        uses: arduino/setup-protoc@v1
        with:
          version: ${{ matrix.config.protobuf-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Buf
        uses: bufbuild/buf-action@v1
        with:
          version: 1.67.0
          setup_only: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protoconf
        working-directory: test/csharp-tableau-loader
        run: buf generate ..

      - name: Test
        working-directory: test/csharp-tableau-loader
        run: dotnet test --nologo --logger "console;verbosity=normal"

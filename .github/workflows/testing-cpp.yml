name: Testing C++

# Trigger on pushes, PRs (excluding documentation changes), and nightly.
on:
  push:
    branches: [ master, main ]
  pull_request:
  schedule:
    - cron: 0 0 * * * # daily at 00:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            go-version: 1.21.x
            init_script: bash init.sh
            run_loader: ./bin/loader
          - os: windows-latest
            go-version: 1.21.x
            init_script: cmd /c init.bat
            run_loader: .\bin\loader.exe

    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake ninja -y

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Init submodules and build protobuf
        run: ${{ matrix.init_script }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v1
        with:
          version: "3.19.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Buf
        uses: bufbuild/buf-action@v1
        with:
          version: 1.67.0
          setup_only: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protoconf
        working-directory: test/cpp-tableau-loader
        run: buf generate ..

      - name: CMake Configure
        working-directory: test/cpp-tableau-loader
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_STANDARD=17

      - name: CMake Build
        working-directory: test/cpp-tableau-loader
        run: cmake --build build --parallel

      - name: Run loader
        working-directory: test/cpp-tableau-loader
        run: ${{ matrix.run_loader }}

name: Testing C++

# Trigger on pushes, PRs (excluding documentation changes), and nightly.
on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    - cron: 0 0 * * * # daily at 00:00
  workflow_dispatch:

permissions:
  contents: read

env:
  VCPKG_COMMIT: dc8d75cfc3281b8e2a4ed8ee4163c891190df932

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        config:
          - label: modern
            protobuf-version: "6.33.4"
          - label: legacy-v3
            protobuf-version: "3.21.12"
        include:
          - os: ubuntu-latest
            triplet: x64-linux
          - os: windows-latest
            triplet: x64-windows-static

    name: test (${{ matrix.os }}, ${{ matrix.config.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    env:
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/vcpkg_installed
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          cache: true

      - name: Install Ninja (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Export GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',    process.env.ACTIONS_CACHE_URL    || '');
            core.exportVariable('ACTIONS_RESULTS_URL',  process.env.ACTIONS_RESULTS_URL  || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Render vcpkg.json
        working-directory: test/cpp-tableau-loader
        shell: bash
        run: |
          cat > vcpkg.json <<EOF
          {
            "name": "loader-cpp-test",
            "version-string": "0.1.0",
            "dependencies": ["protobuf"],
            "overrides": [
              { "name": "protobuf", "version": "${{ matrix.config.protobuf-version }}" }
            ],
            "builtin-baseline": "${{ env.VCPKG_COMMIT }}"
          }
          EOF

      - name: Setup vcpkg & install protobuf
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}
          vcpkgJsonGlob: "test/cpp-tableau-loader/vcpkg.json"
          runVcpkgInstall: true

      - name: Add vcpkg-installed protoc to PATH (Linux)
        if: runner.os == 'Linux'
        run: echo "$VCPKG_INSTALLED_DIR/${{ matrix.triplet }}/tools/protobuf" >> "$GITHUB_PATH"

      - name: Add vcpkg-installed protoc to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "$env:VCPKG_INSTALLED_DIR\${{ matrix.triplet }}\tools\protobuf"

      - name: Verify protoc
        shell: bash
        run: |
          which protoc
          protoc --version

      - name: Install Buf
        uses: bufbuild/buf-action@v1
        with:
          version: 1.67.0
          setup_only: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protoconf
        working-directory: test/cpp-tableau-loader
        run: buf generate ..

      - name: CMake Configure
        working-directory: test/cpp-tableau-loader
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_STANDARD=17
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
          -DVCPKG_INSTALLED_DIR=${{ env.VCPKG_INSTALLED_DIR }}
          -DVCPKG_MANIFEST_INSTALL=OFF

      - name: CMake Build
        working-directory: test/cpp-tableau-loader
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: test/cpp-tableau-loader
        run: ctest --test-dir build --output-on-failure

name: Testing C++

# Trigger on pushes, PRs (excluding documentation changes), and nightly.
on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    - cron: 0 0 * * * # daily at 00:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        protobuf-version: ["32.0", "3.19.3"]
        include:
          - os: ubuntu-latest
            init_script: bash init.sh
          - os: windows-latest
            init_script: cmd /c init.bat

    name: test (${{ matrix.os }}, protobuf ${{ matrix.protobuf-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          cache: true

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        # ubuntu-latest preinstalls cmake but not ninja-build.
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      # Note: windows-latest (Windows Server 2022) preinstalls CMake, Ninja,
      # Visual Studio 2022 + MSVC C++ toolchain, and vswhere. No 'choco install'
      # step is needed; the Setup MSVC step below is sufficient.
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Cache the prebuilt protobuf install dir. The init scripts have a
      # fast path: if .build/_install is present (e.g. restored from cache),
      # they skip the (very long) protobuf compile and exit early.
      # Key invalidates automatically when:
      #   - the OS changes (binaries are not portable),
      #   - the requested protobuf version changes,
      #   - build scripts change (init.sh / init.bat / .gitmodules), which
      #     covers BUILD_TYPE flips, flag changes, etc.
      - name: Cache protobuf install
        id: cache-protobuf
        uses: actions/cache@v4
        with:
          path: |
            third_party/_submodules/protobuf/.build/_install
          key: protobuf-${{ matrix.os }}-${{ matrix.protobuf-version }}-${{ hashFiles('init.sh', 'init.bat', '.gitmodules') }}
          restore-keys: |
            protobuf-${{ matrix.os }}-${{ matrix.protobuf-version }}-

      - name: Init submodules and build protobuf
        run: ${{ matrix.init_script }}
        env:
          PROTOBUF_REF: v${{ matrix.protobuf-version }}

      - name: Install Protoc
        if: "!startsWith(matrix.protobuf-version, '3.')"
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ matrix.protobuf-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Protoc (legacy)
        if: startsWith(matrix.protobuf-version, '3.')
        uses: arduino/setup-protoc@v1
        with:
          version: ${{ matrix.protobuf-version }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Buf
        uses: bufbuild/buf-action@v1
        with:
          version: 1.67.0
          setup_only: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protoconf
        working-directory: test/cpp-tableau-loader
        run: buf generate ..

      - name: CMake Configure
        working-directory: test/cpp-tableau-loader
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_STANDARD=17

      - name: CMake Build
        working-directory: test/cpp-tableau-loader
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: test/cpp-tableau-loader
        run: ctest --test-dir build --output-on-failure

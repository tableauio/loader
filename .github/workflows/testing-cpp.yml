name: Testing C++

# Trigger on pushes, PRs (excluding documentation changes), and nightly.
on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    - cron: 0 0 * * * # daily at 00:00
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            init_script: bash init.sh
            gen_script: bash gen.sh
            cmake_config: cmake -S . -B build
            run_loader: ./bin/loader
          - os: windows-latest
            init_script: cmd /c init.bat
            gen_script: cmd /c gen.bat
            cmake_config: cmake -S . -B build -G "NMake Makefiles"
            run_loader: .\bin\loader.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21.x
          cache: true

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.x"

      - name: Setup MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Init protobuf
        run: ${{ matrix.init_script }}

      - name: Generate protoconf
        working-directory: test/cpp-tableau-loader
        run: ${{ matrix.gen_script }}

      - name: CMake Configure
        working-directory: test/cpp-tableau-loader
        run: ${{ matrix.cmake_config }}

      - name: CMake Build
        working-directory: test/cpp-tableau-loader
        run: cmake --build build --parallel

      - name: Run loader
        working-directory: test/cpp-tableau-loader
        run: ${{ matrix.run_loader }}
